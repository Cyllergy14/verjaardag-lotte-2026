<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verjaardag Game ❤️</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#fff0f5;
    padding-top:80px;
    overflow:hidden;
}

h1{
    color:#e91e63;
}

/* standaard knoppen */
button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    margin:10px;
    transition: all 0.4s ease;
}

/* JA fase 1 */
#ja{
    background:#4caf50;
    color:white;
    position:absolute;
}

/* NEE */
#nee1, #nee2{
    background:#f44336;
    color:white;
}

/* popup */
.popup{
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    max-width:300px;
    position:relative;
}

.popup img{
    width:100%;
    border-radius:15px;
    margin-bottom:10px;
}

/* FASE 3 BIG NEE */
.center-big{
    position:fixed !important;
    top:50% !important;
    left:50% !important;
    transform:translate(-50%, -50%) scale(2);
}

/* animatie vallen */
.fall{
    animation: fallDown 0.8s forwards;
}

@keyframes fallDown{
    to{
        transform: translateY(600px) rotate(720deg);
        opacity:0;
    }
}

/* breken */
.break{
    animation: breakApart 0.8s forwards;
}

@keyframes breakApart{
    0%{ transform:scale(1); opacity:1; }
    50%{ transform:scale(0.5) rotate(10deg); }
    100%{ transform:scale(0) rotate(360deg); opacity:0; }
}
</style>
</head>

<body>

<h1 id="vraag">Wil je een nieuwe kitten? 🐱</h1>

<div id="fase1">
    <button id="ja">JA</button>
    <button id="nee1">NEE</button>
</div>

<div id="fase2" style="display:none;">
    <h1 id="vraag2">Wil je bloemen? 💐</h1>
    <button id="ja2">JA</button>
    <button id="nee2">NEE</button>
</div>

<div id="fase3" style="display:none;">
    <h1>Wil je een nieuw lief voor je verjaardag? 😏</h1>
    <button id="fase3ja">JA</button>
    <button id="fase3nee">NEE</button>
</div>

<!-- POPUP 1 -->
<div class="popup" id="popup1">
  <div class="popup-content">
    <img src="fotoman1.jpg">
    <p>Weet je het zeker, schatje? 😏</p>
    <button id="p1ja">JA</button>
    <button id="p1nee">NEE</button>
  </div>
</div>

<!-- POPUP 2 -->
<div class="popup" id="popup2">
  <div class="popup-content">
    <img src="fotoman2.jpg">
    <p>Ben je echt zeker? 😌</p>
    <button id="p2ja">JA</button>
    <button id="p2nee">NEE</button>
  </div>
</div>

<script>

/* =========================
FASE 1: JA VLIEGT WEG
========================= */
const ja = document.getElementById("ja");

ja.addEventListener("mouseover", move);

function move(){
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 120);
    ja.style.left = x + "px";
    ja.style.top = y + "px";
}

/* FASE 1 -> 2 */
document.getElementById("nee1").onclick = () => {
    document.getElementById("fase1").style.display = "none";
    document.getElementById("vraag").style.display = "none";
    document.getElementById("fase2").style.display = "block";
};

/* =========================
FASE 2: JA KRIMPT
========================= */
let scale = 1;

document.getElementById("ja2").onclick = () => {
    scale -= 0.1;
    if(scale < 0.3) scale = 0.3;

    document.getElementById("ja2").style.transform = `scale(${scale})`;
    document.getElementById("nee2").style.transform = `scale(${2 - scale})`;
};

/* FASE 2 -> 3 */
document.getElementById("nee2").onclick = () => {
    document.getElementById("fase2").style.display = "none";
    document.getElementById("vraag2").style.display = "none";
    document.getElementById("fase3").style.display = "block";
};

/* =========================
FASE 3: JA VERDWIJNT
========================= */
const f3ja = document.getElementById("fase3ja");
const f3nee = document.getElementById("fase3nee");

f3ja.onclick = () => {
    f3ja.style.display = "none";
    f3nee.classList.add("center-big");
};

/* =========================
POPUP 1
========================= */
document.getElementById("fase3nee").onclick = () => {
    document.getElementById("popup1").style.display = "flex";
};

document.getElementById("p1nee").onclick = (e) => {
    e.target.classList.add("fall");

    document.getElementById("p1ja").style.transform = "scale(2)";
    document.getElementById("p1ja").style.position = "absolute";
    document.getElementById("p1ja").style.left = "50%";
    document.getElementById("p1ja").style.top = "60%";
};

document.getElementById("p1ja").onclick = () => {
    document.getElementById("popup1").style.display = "none";
    document.getElementById("popup2").style.display = "flex";
};

/* =========================
POPUP 2
========================= */
document.getElementById("p2nee").onclick = (e) => {
    e.target.classList.add("break");

    document.getElementById("p2ja").style.transform = "scale(2)";
    document.getElementById("p2ja").style.position = "absolute";
    document.getElementById("p2ja").style.left = "50%";
    document.getElementById("p2ja").style.top = "60%";
};

document.getElementById("p2ja").onclick = () => {
    document.body.innerHTML = `
        <h1>❤️ Perfect...</h1>
        <p>Je had nooit echt keuze 😏</p>
    `;
};

</script>

</body>
</html>
