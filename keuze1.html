<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verjaardag Game ❤️</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#fff0f5;
    padding-top:80px;
    overflow-x:hidden;
}

h1{
    color:#e91e63;
}

/* knoppen */
button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    margin:10px;
    transition:all 0.4s ease;
    max-width: 80%;
}

/* JA vlucht knop */
#ja{
    background:#4caf50;
    color:white;
    position:absolute;
}

/* NEE */
#nee1, #nee2{
    background:#f44336;
    color:white;
}

/* afbeeldingen */
img{
    max-width: 80%;
    height: auto;
    border-radius: 20px;
}

.katfoto, .fotokat4{
    width:220px;
    max-width:60vw;
    margin:15px 0;
}

/* POPUPS */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    max-width:300px;
}

.popup img{
    width:100%;
    border-radius:15px;
}

/* animaties */
.fall{
    animation:fallDown 0.8s forwards;
}

@keyframes fallDown{
to{
    transform:translateY(600px) rotate(720deg);
    opacity:0;
}
}

.break{
    animation:breakApart 0.8s forwards;
}

@keyframes breakApart{
0%{transform:scale(1); opacity:1;}
50%{transform:scale(0.5) rotate(10deg);}
100%{transform:scale(0) rotate(360deg); opacity:0;}
}

/* GIF SCREEN */
.gif-screen{
    height:100vh;
    width:100%;
    background:#fff0f5;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.gif-content{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.firegif{
    width:250px;
    border-radius:20px;
}

/* FINAL SCREEN */
.final-screen{
    height:100vh;
    width:100%;
    background:#fff0f5;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.final-text{
    font-size:28px;
    color:#e91e63;
    max-width:800px;
    line-height:1.5;
}

/* RESPONSIVE */
@media (max-width: 600px){

    body{
        padding-top:40px;
    }

    h1{
        font-size:22px;
    }

    button{
        font-size:16px;
        padding:12px 20px;
    }

    .katfoto, .fotokat4{
        width:180px;
    }

    .firegif{
        width:200px;
    }
}

</style>

</head>

<body>

<h1 id="vraag">Wil je een nieuwe kitten? 🐱</h1>

<div id="fase1">

<img src="fotokat4.jpg" class="fotokat4">

<br>

<button id="ja">JA</button>
<button id="nee1">NEE</button>

</div>

<div id="fase2" style="display:none;">

<h1 id="vraag2">Wil je bloemen? 💐</h1>

<img src="fotobloemen1.jpg" class="katfoto">

<br>

<button id="ja2">JA</button>
<button id="nee2">NEE</button>

</div>

<div id="fase3" style="display:none;">

<h1>Wil je een nieuw lief voor je verjaardag? 😏</h1>

<img src="fotoweekend1.jpg" class="katfoto">

<br>

<button id="fase3ja">JA</button>
<button id="fase3nee">NEE</button>

</div>

<!-- POPUPS -->
<div class="popup" id="popup1">
<div class="popup-content">
<img src="fotoman1.jpg">
<p>Weet je het zeker, schatje? 😏</p>
<button id="p1ja">JA</button>
<button id="p1nee">NEE</button>
</div>
</div>

<div class="popup" id="popup2">
<div class="popup-content">
<img src="fotoman2.jpg">
<p>Ben je echt zeker? 😌</p>
<button id="p2ja">JA</button>
<button id="p2nee">NEE</button>
</div>
</div>

<script>

/* FASE 1 */
const ja=document.getElementById("ja");

ja.onmouseover=()=>{
ja.style.left=Math.random()*(window.innerWidth-120)+"px";
ja.style.top=Math.random()*(window.innerHeight-120)+"px";
};

/* FASE 1 -> 2 */
document.getElementById("nee1").onclick=()=>{
fase1.style.display="none";
vraag.style.display="none";
fase2.style.display="block";
};

/* FASE 2 */
let scale=1;

ja2.onclick=()=>{
scale-=0.1;
if(scale<0.3) scale=0.3;
ja2.style.transform=`scale(${scale})`;
nee2.style.transform=`scale(${2-scale})`;
};

nee2.onclick=()=>{
fase2.style.display="none";
vraag2.style.display="none";
fase3.style.display="block";
};

/* FASE 3 */
fase3ja.onclick=()=>{
fase3ja.style.display="none";
fase3nee.style.position="fixed";
fase3nee.style.left="50%";
fase3nee.style.transform="translateX(-50%) scale(2)";
};

fase3nee.onclick=()=>{
popup1.style.display="flex";
};

/* POPUP 1 */
p1nee.onclick=(e)=>{
e.target.classList.add("fall");
p1ja.style.transform="scale(2)";
};

p1ja.onclick=()=>{
popup1.style.display="none";
popup2.style.display="flex";
};

/* POPUP 2 -> GIF SCREEN */
p2ja.onclick=()=>{

document.body.innerHTML=`
<div class="gif-screen">

    <div class="gif-content">

        <h1>🔥Goed gekozen, want er is maar 1 persoon die jou in vuur en vlam zet ❤️</h1>

        <img src="giffire.gif" class="firegif">

        <p>Nog één laatste stapje... 😏</p>

        <button id="nextBtn">VOLGENDE ➜</button>

    </div>

</div>
`;

};

/* NEXT BUTTON -> FINAL SCREEN */
document.addEventListener("click", function(e){

if(e.target && e.target.id==="nextBtn"){

document.body.innerHTML=`
<div class="final-screen">
    <h1 class="final-text"></h1>
</div>
`;

let tekst="Goed gedaan ❤️ je hebt de vragen correct beantwoord en hebt een weekendje gewonnen. Hou 24-07-2026, 25-07-2026 & 26-07-2026 vrij. Zie je dan meis!";
let i=0;

function type(){
if(i<tekst.length){
document.querySelector(".final-text").innerHTML += tekst.charAt(i);
i++;
setTimeout(type,30);
}
}

type();

}

});

</script>

</body>
</html>
