<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verjaardag Game ❤️</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#fff0f5;
    padding-top:80px;
    overflow-x:hidden;
}

html, body{
    height:100%;
    margin:0;
    touch-action: manipulation;
}

h1{
    color:#e91e63;
}

/* buttons */
button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    margin:10px;
    transition:0.2s;
    max-width: 80%;
}

/* 💥 SMART EVASIVE JA BUTTON */
#ja{
    background:#4caf50;
    color:white;
    position:absolute;
    left:50%;
    top:320px;
    transform:translateX(-50%);
}

/* NEE */
#nee1, #nee2{
    background:#f44336;
    color:white;
}

.button-row{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

/* images */
img{
    max-width:80%;
    border-radius:20px;
}

.katfoto,.fotokat4,.weekendfoto{
    width:220px;
    max-width:60vw;
    margin:15px 0;
}

/* popup */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:white;
    padding:20px;
    border-radius:20px;
}

/* GIF */
.gif-screen{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.gif-content{
    display:flex;
    flex-direction:column;
    gap:15px;
    align-items:center;
}

/* FIX VOLGENDE KNOP */
#nextBtn{
    margin-top:0;
    position:relative;
    top:-20px;
    z-index:999;
}

.firegif{
    width:220px;
}

/* FINAL */
.final-screen{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.final-content{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.final-text-top,
.final-text-bottom{
    font-size:24px;
    color:#e91e63;
}

/* CONFETTI CANVAS */
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
    z-index:9999;
}

</style>
</head>

<body>

<h1 id="vraag">Wil je een nieuwe kitten? 🐱</h1>

<div id="fase1">
<img src="fotokat4.jpg" class="fotokat4">

<div class="button-row">
    <button id="ja">JA</button>
    <button id="nee1">NEE</button>
</div>
</div>

<div id="fase2" style="display:none;">
<h1 id="vraag2">Wil je bloemen? 💐</h1>
<img src="fotobloemen1.jpg">
<br>
<button id="ja2">JA</button>
<button id="nee2">NEE</button>
</div>

<div id="fase3" style="display:none;">
<h1>Wil je een nieuw lief voor je verjaardag? 😏</h1>
<img src="fotosamen1.jpg">
<br>
<button id="fase3ja">JA</button>
<button id="fase3nee">NEE</button>
</div>

<!-- POPUPS -->
<div class="popup" id="popup1">
<div class="popup-content">
<img src="fotoman1.jpg">
<p>Weet je het zeker? 😏</p>
<button id="p1ja">JA</button>
<button id="p1nee">NEE</button>
</div>
</div>

<div class="popup" id="popup2">
<div class="popup-content">
<img src="fotoman2.jpg">
<p>Ben je echt zeker? 😌</p>
<button id="p2ja">JA</button>
<button id="p2nee">NEE</button>
</div>
</div>

<canvas id="confetti"></canvas>

<script>

/* =========================
   💥 SMART AI JA BUTTON
========================= */

const ja = document.getElementById("ja");

function moveAway(x,y){
    const rect = ja.getBoundingClientRect();

    let dx = rect.left - x;
    let dy = rect.top - y;

    ja.style.left = (rect.left + dx * 0.6 + (Math.random()*60-30)) + "px";
    ja.style.top = (rect.top + dy * 0.6 + (Math.random()*60-30)) + "px";
}

/* touch AI tracking */
document.addEventListener("touchmove", (e)=>{
    const t = e.touches[0];
    moveAway(t.clientX, t.clientY);
});

/* mouse fallback */
document.addEventListener("mousemove", (e)=>{
    moveAway(e.clientX, e.clientY);
});

/* =========================
   FLOW
========================= */

document.getElementById("nee1").onclick=()=>{
fase1.style.display="none";
vraag.style.display="none";
fase2.style.display="block";
};

let scale=1;
ja2.onclick=()=>{
scale-=0.1;
if(scale<0.3) scale=0.3;
ja2.style.transform=`scale(${scale})`;
};

nee2.onclick=()=>{
fase2.style.display="none";
fase3.style.display="block";
};

fase3ja.onclick=()=>{
fase3ja.style.display="none";
fase3nee.style.position="fixed";
fase3nee.style.left="50%";
fase3nee.style.transform="translateX(-50%) scale(2)";
};

fase3nee.onclick=()=>{
popup1.style.display="flex";
};

p1nee.onclick=(e)=>{
e.target.style.opacity="0";
p1ja.style.transform="scale(2)";
};

p1ja.onclick=()=>{
popup1.style.display="none";
popup2.style.display="flex";
};

p2ja.onclick=()=>{

document.body.innerHTML=`
<div class="gif-screen">
<div class="gif-content">
<h1>🔥 Jij bent gekozen ❤️</h1>
<img src="giffire.gif" class="firegif">
<p>Laatste stap...</p>
<button id="nextBtn">VOLGENDE ➜</button>
</div>
</div>
`;

};

/* =========================
   FINAL + CONFETTI
========================= */

document.addEventListener("click",(e)=>{
if(e.target.id==="nextBtn"){

document.body.innerHTML=`
<div class="final-screen">
<div class="final-content">

<h1 class="final-text-top"></h1>

<img src="fotoweekend1.jpg" class="weekendfoto">

<h1 class="final-text-bottom"></h1>

</div>
</div>
`;

startConfetti();

let top="Goed gedaan ❤️ je hebt de vragen correct beantwoord en hebt een weekendje gewonnen.";
let bottom="Hou 24-07-2026, 25-07-2026 & 26-07-2026 vrij. Zie je dan & love you meis!";

let i=0;

function t1(){
if(i<top.length){
document.querySelector(".final-text-top").innerHTML+=top[i++];
setTimeout(t1,25);
}else{
i=0;
t2();
}
}

function t2(){
if(i<bottom.length){
document.querySelector(".final-text-bottom").innerHTML+=bottom[i++];
setTimeout(t2,25);
}
}

t1();

}
});

/* =========================
   🎉 SIMPLE CONFETTI ENGINE
========================= */

const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

let pieces = [];

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

function startConfetti(){

pieces = [];

for(let i=0;i<120;i++){
pieces.push({
x:Math.random()*canvas.width,
y:-20,
r:Math.random()*6+4,
d:Math.random()*120,
color:`hsl(${Math.random()*360},100%,60%)`,
tilt:Math.random()*10
});
}

animate();
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach(p=>{
p.y += 3;
p.x += Math.sin(p.d)*2;

ctx.fillStyle=p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(animate);
}

</script>

</body>
</html>
